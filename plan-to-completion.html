<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plan To Completion</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Cormorant+Garamond:wght@400;500;600&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #efe6d8;
        color: #17130f;
        font-family: "Cormorant Garamond", serif;
        overflow: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .bg-scene {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          linear-gradient(rgba(255, 244, 233, 0.06), rgba(255, 244, 233, 0.18)),
          url("plan-background.jpg") center center / cover no-repeat;
        filter: saturate(1.02) contrast(1.02);
      }

      .bg-scene::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 22% 18%, rgba(255,255,255,0.14), transparent 22%),
          radial-gradient(circle at 78% 66%, rgba(255,255,255,0.08), transparent 24%);
        pointer-events: none;
      }

      .page {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        width: min(100vw - 40px, 1400px);
        margin: 0 auto;
        padding: 18px 0 28px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .kicker,
      .nav a {
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(23, 19, 15, 0.78);
      }

      .nav {
        display: flex;
        gap: 16px;
      }

      .nav a {
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
      }

      .nav a:hover,
      .nav a:focus-visible {
        border-color: rgba(23, 19, 15, 0.4);
      }

      .hero {
        position: relative;
        min-height: calc(100vh - 70px);
        display: grid;
        place-items: center;
      }

      .plan-card {
        position: relative;
        z-index: 5;
        width: min(82vw, 940px);
        transform: rotate(0deg);
        box-shadow: none;
        background: transparent;
        backdrop-filter: none;
      }


      .plan-card img {
        display: block;
        width: 100%;
        height: auto;
      }

      .model-wrap {
        position: fixed;
        right: 1.8vw;
        bottom: 1.4vh;
        width: min(28vw, 360px);
        height: min(34vw, 420px);
        z-index: 3;
        pointer-events: none;
      }

      #mushroom-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      @media (max-width: 720px) {
        .page {
          width: min(100vw - 24px, 1400px);
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }

        .plan-card {
          width: min(92vw, 940px);
        }

        .model-wrap {
          width: min(42vw, 240px);
          height: min(50vw, 280px);
          right: 2vw;
          bottom: 2vh;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/three.module.js",
          "three/addons/": "./vendor/three/"
        }
      }
    </script>
  </head>
  <body>
    <div class="bg-scene" aria-hidden="true"></div>
    <div class="model-wrap" aria-hidden="true">
      <canvas id="mushroom-canvas"></canvas>
    </div>

    <div class="page">
      <header class="header">
        <p class="kicker">Plan To Completion</p>
        <nav class="nav">
          <a href="index.html">Home</a>
        </nav>
      </header>

      <main class="hero">
        <figure class="plan-card">
          <img src="plan.png" alt="Plan to completion table" />
        </figure>
      </main>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      const canvas = document.getElementById("mushroom-canvas");
      const scene = new THREE.Scene();

      const renderer = new THREE.WebGLRenderer({
        canvas,
        alpha: true,
        antialias: true
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
      camera.position.set(0, 0.2, 5.6);

      scene.add(new THREE.AmbientLight(0xffffff, 1.18));

      const dir1 = new THREE.DirectionalLight(0xffffff, 1.05);
      dir1.position.set(3, 4, 5);
      scene.add(dir1);

      const dir2 = new THREE.DirectionalLight(0xd4c7ff, 0.45);
      dir2.position.set(-2, 1, 3);
      scene.add(dir2);

      let mushroom = null;

      function resize() {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      resize();
      window.addEventListener("resize", resize);

      const loader = new GLTFLoader();
      loader.load("./mushroom-2.glb", (gltf) => {
        mushroom = gltf.scene;
        mushroom.position.set(0.25, -0.9, 0);
        mushroom.rotation.x = 0.14;
        mushroom.scale.setScalar(2.2);

        mushroom.traverse((child) => {
          if (child.isMesh && child.material) {
            child.material.transparent = true;
            child.material.opacity = 0.42;
          }
        });

        scene.add(mushroom);
      });

      function animate() {
        requestAnimationFrame(animate);

        if (mushroom) {
          mushroom.rotation.y += 0.006;
        }

        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
