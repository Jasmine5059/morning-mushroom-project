<!DOCTYPE html>

  <head>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #050505;
        color: rgba(248, 245, 238, 0.96);
        font-family: "Cormorant Garamond", serif;
        overflow-x: hidden;
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 36 36'><path fill='white' d='M18 5c6.4 0 11.4 3.6 12.8 9.4-2.2.7-4.7 1.1-7.3 1.3-1 .1-2 .1-3 .1s-2 0-3-.1c-2.6-.2-5.1-.6-7.3-1.3C6.6 8.6 11.6 5 18 5Zm-2.2 11.3h4.4v4.8c0 1.2.4 2.1 1.2 2.9.7.7 1.1 1.6 1.1 2.8 0 2.2-1.8 3.9-4.5 3.9s-4.5-1.7-4.5-3.9c0-1.2.4-2.1 1.1-2.8.8-.8 1.2-1.7 1.2-2.9v-4.8Z'/><circle fill='white' cx='13.5' cy='11.4' r='1.1'/><circle fill='white' cx='18.3' cy='9.9' r='1'/><circle fill='white' cx='23.2' cy='11.2' r='1.05'/></svg>")
            8 8,
          auto;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      p,
      h1,
      h2 {
        margin: 0;
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .center-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      .center-video video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        background: #000;
        opacity: 0.96;
        filter: saturate(0.98) contrast(1.08) brightness(0.94);
      }

      .bg-wash {
        position: fixed;
        inset: 0;
        z-index: 1;
        background:
          radial-gradient(circle at 50% 28%, rgba(110, 118, 152, 0.04), transparent 18%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.14));
      }

      .page {
        position: relative;
        z-index: 2;
        width: min(100vw - 40px, 1120px);
        margin: 0 auto;
        min-height: 100vh;
        padding: 18px 0 72px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
      }

      .kicker,
      .nav a {
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.84);
      }

      .nav {
        display: flex;
        gap: 16px;
      }

      .nav a {
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
      }

      .nav a:hover,
      .nav a:focus-visible {
        border-color: rgba(255, 255, 255, 0.56);
      }

      .main {
        min-height: calc(100vh - 90px);
      }

      @media (max-width: 800px) {
        .page {
          width: min(100vw - 24px, 1120px);
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .main {
          min-height: calc(100vh - 110px);
        }
      }
    </style>
  </head>

</video>


      </div>
    </div>

    <div class="bg-wash" aria-hidden="true"></div>

    <div class="page">

        </nav>
      </header>

      <main class="main">
      </main>
    </div>
  </body>
