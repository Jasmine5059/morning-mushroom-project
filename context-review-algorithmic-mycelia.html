<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithmic Mycelia</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #050505;
        color: rgba(248, 245, 238, 0.95);
        font-family: "Cormorant Garamond", serif;
        overflow-x: hidden;
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><path fill='white' d='M16 6c5.2 0 9.3 3.1 10.4 8.1-3.1.8-6.8 1.2-10.4 1.2S8.7 14.9 5.6 14.1C6.7 9.1 10.8 6 16 6Zm-1.2 10.2h2.4v7.2c0 1.7-.7 2.6-1.2 2.6s-1.2-.9-1.2-2.6v-7.2Z'/></svg>")
            8 8,
          auto;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      p,
      h1,
      h2,
      blockquote {
        margin: 0;
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .center-video {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(94vw, 1800px);
  height: min(88vh, 1400px);
  background: rgba(255, 255, 255, 0.03);
  box-shadow: 0 26px 58px rgba(0, 0, 0, 0.36);
  overflow: hidden;
}


      .center-video video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        background: #000;
        opacity: 0.96;
        filter: saturate(0.98) contrast(1.03) brightness(0.98);
      }

      .bg-wash {
        position: fixed;
        inset: 0;
        z-index: 1;
        background:
          radial-gradient(circle at 50% 28%, rgba(104, 112, 154, 0.04), transparent 24%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.22));
      }

      .page {
        position: relative;
        z-index: 2;
        width: min(100vw - 40px, 1120px);
        margin: 0 auto;
        min-height: 100vh;
        padding: 18px 0 72px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
      }

      .kicker,
      .nav a {
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.82);
      }

      .nav {
        display: flex;
        gap: 16px;
      }

      .nav a {
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
      }

      .nav a:hover,
      .nav a:focus-visible {
        border-color: rgba(255, 255, 255, 0.52);
      }

      .main {
        position: relative;
        min-height: calc(100vh - 90px);
      }

      .title-block {
        position: absolute;
        left: 50%;
        bottom: 6vh;
        transform: translateX(-50%);
        display: grid;
        justify-items: center;
      }

      h1 {
        max-width: 18ch;
        text-align: center;
        font-size: clamp(2.7rem, 5vw, 4.5rem);
        line-height: 0.95;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.96);
      }

      h2 {
        width: min(100%, 52rem);
        margin: 8px auto 0;
        font-size: clamp(1.5rem, 2.6vw, 2.25rem);
        line-height: 1;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.94);
      }

      .text {
        display: grid;
        gap: 18px;
        justify-items: center;
      }

      .text p,
      .text blockquote {
        width: min(100%, 52rem);
        text-align: justify;
        text-align-last: left;
        font-size: 1.06rem;
        line-height: 1.9;
        color: rgba(245, 241, 233, 0.92);
      }

      .text blockquote {
        border-left: 1px solid rgba(255, 255, 255, 0.12);
        padding-left: 16px;
        font-style: italic;
      }

      @media (max-width: 800px) {
        .page {
          width: min(100vw - 24px, 1120px);
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .center-video {
          top: 11vh;
          width: 86vw;
          height: 32vh;
        }

        .title-block {
          bottom: 5vh;
        }

        .text p,
        .text blockquote,
        h2 {
          width: 100%;
        }

        h1 {
          font-size: clamp(2.1rem, 7vw, 3.4rem);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true">
      <div class="center-video">
        <video autoplay muted loop playsinline>
          <source src="context-video-5.MP4" type="video/mp4" />
        </video>
      </div>
    </div>

    <div class="bg-wash" aria-hidden="true"></div>

    <div class="page">
      <header class="header">
        <p class="kicker"></p>
        <nav class="nav">
          <a href="context-review.html">Back</a>
          <a href="index.html">Home</a>
        </nav>
      </header>

      <main class="main">
        <section class="title-block">
          <p class="kicker">Algorithmic Mycelia</p>
        </section>
      </main>
    </div>
  </body>
</html>
