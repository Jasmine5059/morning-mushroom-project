<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4.1 Taoist Philosophical Reflection</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #050505;
        color: rgba(248, 245, 238, 0.95);
        font-family: "Cormorant Garamond", serif;
        overflow-x: hidden;
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><path fill='white' d='M16 6c5.2 0 9.3 3.1 10.4 8.1-3.1.8-6.8 1.2-10.4 1.2S8.7 14.9 5.6 14.1C6.7 9.1 10.8 6 16 6Zm-1.2 10.2h2.4v7.2c0 1.7-.7 2.6-1.2 2.6s-1.2-.9-1.2-2.6v-7.2Z'/></svg>")
            8 8,
          auto;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      p,
      h1,
      h2,
      blockquote {
        margin: 0;
      }

      .canvas-wrap {
        position: fixed;
        right: -2vw;
        bottom: -6vh;
        width: min(46vw, 580px);
        height: min(50vh, 470px);
        z-index: 3;
        pointer-events: none;
      }

      #bg-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .page {
        position: relative;
        z-index: 2;
        width: min(100vw - 40px, 1120px);
        margin: 0 auto;
        min-height: 100vh;
        padding: 18px 0 64px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
      }

      .kicker,
      .nav a {
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.8);
      }

      .nav {
        display: flex;
        gap: 16px;
      }

      .nav a {
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
      }

      .nav a:hover,
      .nav a:focus-visible {
        border-color: rgba(255, 255, 255, 0.5);
      }

      .main {
        display: grid;
        gap: 18px;
        padding-top: 30px;
      }

      .video-wrap {
  position: relative;
  width: min(100%, 900px);
  margin: 0 auto 8px;
  background: #000;
  box-shadow: 0 22px 50px rgba(0, 0, 0, 0.34);
  overflow: hidden;
}


     .video-wrap video {
  width: 100%;
  display: block;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  background: #000;
}

      .title-block {
        display: grid;
        gap: 4px;
        justify-items: center;
      }

      h1 {
        max-width: 18ch;
        text-align: center;
        font-size: clamp(1.7rem, 3vw, 2.6rem);
        line-height: 0.94;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.96);
      }

      h2 {
        width: min(100%, 52rem);
        margin: 8px auto 0;
        font-size: clamp(1.5rem, 2.6vw, 2.3rem);
        line-height: 1;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.94);
      }

      .text {
        display: grid;
        gap: 18px;
        justify-items: center;
      }

      .text p,
      .text blockquote {
        width: min(100%, 52rem);
        text-align: justify;
        text-align-last: left;
        font-size: 1.06rem;
        line-height: 1.9;
        color: rgba(245, 241, 233, 0.9);
      }

      .text blockquote {
        font-style: italic;
        border-left: 1px solid rgba(255, 255, 255, 0.12);
        padding-left: 16px;
      }

      .qi-mark {
  display: inline-block;
  color: rgba(210, 225, 255, 0.96);
  text-shadow: 0 0 14px rgba(154, 190, 255, 0.34);
  animation: qiShake 3.2s ease-in-out infinite;
}


      .qi-breeze {
        position: relative;
      }

      .qi-breeze .word {
        display: inline-block;
        animation: breezeDrift var(--dur, 6s) ease-in-out infinite;
        animation-delay: var(--delay, 0s);
      }

      .ribbon-quote {
        width: min(100%, 56rem);
        margin: 0 auto;
        min-height: 8rem;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        column-gap: 0.28em;
        row-gap: 0.2em;
        line-height: 1.5;
        font-size: 1.02rem;
        font-style: italic;
      }

      .ribbon-quote .word {
        display: inline-block;
        animation: ribbonFloat 5.8s ease-in-out infinite;
        animation-delay: var(--delay, 0s);
      }

      .ribbon-quote .word:nth-child(5n + 1) { transform: translateY(-12px); }
      .ribbon-quote .word:nth-child(5n + 2) { transform: translateY(-4px); }
      .ribbon-quote .word:nth-child(5n + 3) { transform: translateY(4px); }
      .ribbon-quote .word:nth-child(5n + 4) { transform: translateY(10px); }
      .ribbon-quote .word:nth-child(5n) { transform: translateY(0px); }

      .loading-note {
        position: fixed;
        right: 24px;
        bottom: 18px;
        z-index: 4;
        font-family: "Orbitron", sans-serif;
        font-size: 0.64rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.38);
        display: none;
      }

      @keyframes qiShake {
  0% { transform: translateY(0px) rotate(0deg); }
  25% { transform: translateY(-1px) rotate(-1deg); }
  50% { transform: translateY(1px) rotate(0.8deg); }
  75% { transform: translateY(-0.5px) rotate(-0.6deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}


      @keyframes breezeDrift {
        0% { transform: translateX(0px) translateY(0px); opacity: 0.88; }
        35% { transform: translateX(8px) translateY(-2px); opacity: 1; }
        70% { transform: translateX(18px) translateY(1px); opacity: 0.92; }
        100% { transform: translateX(0px) translateY(0px); opacity: 0.88; }
      }

      @keyframes ribbonFloat {
        0% { transform: translateY(0px) rotate(0deg); }
        25% { transform: translateY(-6px) rotate(-1.2deg); }
        50% { transform: translateY(3px) rotate(1deg); }
        75% { transform: translateY(-2px) rotate(-0.8deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }

      @media (max-width: 800px) {
        .page {
          width: min(100vw - 24px, 1120px);
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .canvas-wrap {
          width: min(54vw, 320px);
          height: min(30vh, 240px);
        }

        .text p,
        .text blockquote,
        .ribbon-quote,
        h2 {
          width: 100%;
        }

        h1 {
          font-size: clamp(1.5rem, 6vw, 2.1rem);
        }
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/three.module.js",
          "three/addons/": "./vendor/three/"
        }
      }
    </script>
  </head>
  <body>
    <div class="canvas-wrap">
      <canvas id="bg-canvas"></canvas>
    </div>
    <p class="loading-note" id="loadingNote">Loading flower model</p>

    <div class="page">
      <header class="header">
        <p class="kicker">Context Review / 4.1</p>
        <nav class="nav">
          <a href="context-review.html">Back</a>
          <a href="index.html">Home</a>
        </nav>
      </header>

      <main class="main">
        <div class="video-wrap">
          <video autoplay muted loop playsinline>
            <source src="context-video-2.mov" type="video/mp4" />
          </video>
        </div>

        <section class="title-block">
          <p class="kicker">Taoist Philosophical Reflection</p>
          <h1>A Downward Theory of Life</h1>
        </section>
      </main>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const loadingNote = document.getElementById("loadingNote");
      const canvas = document.getElementById("bg-canvas");

      function wrapWords(selector) {
        document.querySelectorAll(selector).forEach((node) => {
          const text = node.textContent.trim();
          const parts = text.split(/\s+/);
          node.innerHTML = parts
            .map((word, index) => {
              const delay = (index % 10) * 0.12;
              return `<span class="word" style="--delay:${delay}s">${word}</span>`;
            })
            .join(" ");
        });
      }

      wrapWords(".word-cloud");

      const scene = new THREE.Scene();

      const renderer = new THREE.WebGLRenderer({
        canvas,
        alpha: true,
        antialias: true
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
      camera.position.set(0, 0.48, 3.8);

      const ambient = new THREE.AmbientLight(0xf4f1ea, 1.2);
      scene.add(ambient);

      const dir1 = new THREE.DirectionalLight(0xffffff, 1.05);
      dir1.position.set(3, 4, 5);
      scene.add(dir1);

      const dir2 = new THREE.DirectionalLight(0xbba7ff, 0.45);
      dir2.position.set(-3, 1, 3);
      scene.add(dir2);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableZoom = false;
      controls.enableDamping = true;
      controls.rotateSpeed = 0.22;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.4;
      controls.minPolarAngle = Math.PI / 2.5;
      controls.maxPolarAngle = Math.PI / 1.8;

      let flower = null;

      function resize() {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      resize();
      window.addEventListener("resize", resize);

      const loader = new GLTFLoader();
      loader.load(
        "./flower.glb",
        (gltf) => {
          flower = gltf.scene;
          flower.position.set(0.5, -0.8, 0);
          flower.rotation.y = -0.3;
          flower.scale.setScalar(2.2);

          flower.traverse((child) => {
            if (child.isMesh && child.material) {
              child.material.transparent = true;
              child.material.opacity = 0.55;
            }
          });

          scene.add(flower);
          loadingNote.style.display = "none";
        },
        undefined,
        () => {
          loadingNote.style.display = "block";
          loadingNote.textContent = "Model failed to load";
        }
      );

      const pointer = { x: 0, y: 0 };

      window.addEventListener("mousemove", (event) => {
        pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
        pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      });

      function animate() {
        requestAnimationFrame(animate);

        if (flower) {
          flower.rotation.x += (pointer.y * 0.05 - flower.rotation.x) * 0.02;
          flower.rotation.z += (pointer.x * 0.05 - flower.rotation.z) * 0.02;
        }

        controls.update();
        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
