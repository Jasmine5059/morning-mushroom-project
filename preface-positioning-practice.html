<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preface / Positioning Practice</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #050605;
        color: rgba(250, 244, 229, 0.9);
        font-family: "Orbitron", sans-serif;
        overflow: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .bg-video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
        background: #050605;
      }

      .video-wash {
        position: fixed;
        inset: 0;
        z-index: 1;
        background: linear-gradient(180deg, rgba(4, 6, 4, 0.08), rgba(4, 6, 4, 0.18));
        pointer-events: none;
      }

      .page {
        position: relative;
        z-index: 2;
        width: min(100vw - 40px, 960px);
        margin: 0 auto;
        min-height: 100vh;
        padding: 18px 0 24px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
      }

      .kicker,
      .nav a {
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .nav {
        display: flex;
        gap: 16px;
      }

      @media (max-width: 800px) {
        .page {
          width: min(100vw - 24px, 960px);
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="preface-video-2.mp4" type="video/mp4" />
    </video>
    <div class="video-wash" aria-hidden="true"></div>

    <div class="page">
      <header class="header">
        <p class="kicker">Preface / 02</p>
        <nav class="nav">
          <a href="preface-encountering-morning-mushroom.html">Next</a>
          <a href="index.html">Home</a>
        </nav>
      </header>
    </div>
  </body>
</html>
