<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mycology and Anthropology</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #050505;
        color: rgba(248, 245, 238, 0.95);
        font-family: "Cormorant Garamond", serif;
        overflow-x: hidden;
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><path fill='white' d='M16 6c5.2 0 9.3 3.1 10.4 8.1-3.1.8-6.8 1.2-10.4 1.2S8.7 14.9 5.6 14.1C6.7 9.1 10.8 6 16 6Zm-1.2 10.2h2.4v7.2c0 1.7-.7 2.6-1.2 2.6s-1.2-.9-1.2-2.6v-7.2Z'/></svg>")
            8 8,
          auto;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      p,
      h1,
      h2,
      blockquote {
        margin: 0;
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .center-video {
        position: absolute;
        left: 50%;
        top: 12vh;
        transform: translateX(-50%);
        width: min(84vw, 1100px);
        height: min(62vh, 720px);
        background: rgba(255, 255, 255, 0.03);
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.32);
        overflow: hidden;
      }

      .center-video video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        background: #000;
        opacity: 0.9;
        filter: saturate(0.9) contrast(1.08) brightness(0.92);
      }

      .bg-wash {
        position: fixed;
        inset: 0;
        z-index: 1;
        background:
          radial-gradient(circle at 50% 28%, rgba(115, 120, 142, 0.08), transparent 18%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.24), rgba(0, 0, 0, 0.66));
      }

      .page {
        position: relative;
        z-index: 2;
        width: min(100vw - 40px, 1120px);
        margin: 0 auto;
        min-height: 100vh;
        padding: 18px 0 72px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
      }

      .kicker,
      .nav a {
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.82);
      }

      .nav {
        display: flex;
        gap: 16px;
      }

      .nav a {
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
      }

      .nav a:hover,
      .nav a:focus-visible {
        border-color: rgba(255, 255, 255, 0.52);
      }

      .main {
        position: relative;
        min-height: calc(100vh - 90px);
      }

      .title-block {
        position: absolute;
        left: 50%;
        bottom: 6vh;
        transform: translateX(-50%);
        z-index: 3;
        display: grid;
        justify-items: center;
      }

      .title-block .kicker {
        font-size: 0.62rem;
        letter-spacing: 0.13em;
      }

      @media (max-width: 800px) {
        .page {
          width: min(100vw - 24px, 1120px);
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .center-video {
          top: 13vh;
          width: 88vw;
          height: 42vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true">
      <div class="center-video">
        <video autoplay muted loop playsinline>
          <source src="context-video-1.MP4" type="video/mp4" />
        </video>
      </div>
    </div>

    <div class="bg-wash" aria-hidden="true"></div>

    <div class="page">
      <header class="header">
        <p class="kicker">Context Review / 4.3</p>
        <nav class="nav">
          <a href="context-review.html">Back</a>
          <a href="index.html">Home</a>
        </nav>
      </header>

      <main class="main">
        <section class="title-block">
          <p class="kicker">Mycology and Anthropology</p>
        </section>
      </main>
    </div>

    <script>
      function wrapWords(selector) {
        document.querySelectorAll(selector).forEach((node) => {
          const text = node.textContent.trim();
          const parts = text.split(/\s+/);
          node.innerHTML = parts
            .map((word, index) => {
              const delay = (index % 10) * 0.16;
              const dur = 4.8 + (index % 4) * 0.6;
              return `<span class="word" style="--delay:${delay}s;--dur:${dur}s">${word}</span>`;
            })
            .join(" ");
        });
      }

      wrapWords(".word-cloud");
    </script>
  </body>
</html>
