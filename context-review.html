<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Review</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
  background:
    radial-gradient(circle at 50% 32%, rgba(244, 246, 250, 0.18), transparent 28%),
    linear-gradient(180deg, #aeb4bc, #9ca4ae);
  color: #fff;
  font-family: "Cormorant Garamond", serif;
  overflow: hidden;
  cursor: auto;
}



      a {
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      p,
      h1,
      h2 {
        margin: 0;
      }

      .overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background:
    linear-gradient(180deg, rgba(18, 24, 30, 0.03), rgba(18, 24, 30, 0.07)),
    radial-gradient(circle at 50% 32%, rgba(255, 255, 255, 0.08), transparent 26%);
}


      .page {
        position: relative;
        z-index: 2;
        width: min(100vw - 40px, 1380px);
        margin: 0 auto;
        min-height: 100vh;
        padding: 18px 0 28px;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
      }

      .kicker,
      .nav a {
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.94);
      }

      .nav {
        display: flex;
        gap: 16px;
      }

      .nav a {
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
      }

      .main {
        position: relative;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 34px;
      }

      .hero-stack {
        position: relative;
        width: min(100%, 980px);
        min-height: 360px;
        display: grid;
        place-items: center;
      }

      .model-wrap {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      #hero-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .title {
        position: relative;
        z-index: 2;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.28em;
        max-width: 14ch;
        text-align: center;
        font-size: clamp(3rem, 5.6vw, 5.6rem);
        line-height: 0.88;
        font-weight: 600;
        letter-spacing: -0.04em;
        color: rgba(255, 255, 255, 0.94);
        text-shadow:
          0 8px 28px rgba(0, 0, 0, 0.22),
          0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .title span {
        display: inline-block;
      }

      .card-grid {
        width: 100%;
        max-width: 920px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        align-items: start;
        justify-items: center;
      }

      .card {
        display: grid;
        gap: 10px;
        justify-items: center;
        text-decoration: none;
      }

      .card,
      .card:link,
      .card:visited,
      .card:hover,
      .card:focus-visible {
        text-decoration: none;
      }

      .card-label {
        min-height: 2.8em;
        font-family: "Orbitron", sans-serif;
        font-size: 0.68rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-align: center;
        color: rgba(255, 255, 255, 0.86);
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.14);
        text-decoration: none;
        border-bottom: none;
        box-shadow: none;
      }

      .card-image {
        width: 100%;
        max-width: 156px;
        aspect-ratio: 4 / 5;
        overflow: hidden;
        background: transparent;
        box-shadow: none;
      }

      .card-image img {
        width: 108%;
        height: 108%;
        object-fit: cover;
        display: block;
        transform: translate(-2%, -2%) scale(1);
        filter: saturate(1.04) contrast(1.02);
      }

      @media (max-width: 1100px) {
        .card-grid {
          grid-template-columns: 1fr 1fr;
          max-width: 760px;
        }
      }

      @media (max-width: 680px) {
        body {
          overflow-y: auto;
        }

        .page {
          width: min(100vw - 24px, 1380px);
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .main {
          padding: 28px 0;
          align-content: start;
        }

        .hero-stack {
          min-height: 220px;
        }

        .card-grid {
          grid-template-columns: 1fr;
          max-width: 320px;
        }

        .title {
          font-size: clamp(3rem, 12vw, 4.8rem);
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/three.module.js",
          "three/addons/": "./vendor/three/"
        }
      }
    </script>
  </head>
  <body>
    <div class="overlay" aria-hidden="true"></div>

    <div class="page">
      <header class="header">
        <p class="kicker">Chapter 4</p>
        <nav class="nav">
          <a href="index.html">Home</a>
        </nav>
      </header>

      <main class="main">
        <section class="hero-stack" aria-label="Title and model">
          <div class="model-wrap" aria-hidden="true">
            <canvas id="hero-canvas"></canvas>
          </div>
          <h1 class="title" aria-label="The Growing Environment of the Mushroom">
            <span class="w1">The</span>
            <span class="w2">Growing</span>
            <span class="w3">Environment</span>
            <span class="w4">of</span>
            <span class="w5">the</span>
            <span class="w6">Mushroom</span>
          </h1>
        </section>

        <section class="card-grid">
          <a class="card" href="context-review-taoist-reflection.html">
            <p class="card-label">Taoist Philosophical Reflection</p>
            <figure class="card-image">
              <img src="context-review-1.jpeg" alt="Context Review 4.1" />
            </figure>
          </a>

          <a class="card" href="context-review-on-becoming.html">
            <p class="card-label">On Becoming: The Morning Mushroom</p>
            <figure class="card-image">
              <img src="context-review-2.png" alt="Context Review 4.2" />
            </figure>
          </a>

          <a class="card" href="context-review-mycology-anthropology.html">
            <p class="card-label">Mycology and Anthropology</p>
            <figure class="card-image">
              <img src="context-review-3.jpg" alt="Context Review 4.3" />
            </figure>
          </a>

          <a class="card" href="context-review-algorithmic-mycelia.html">
            <p class="card-label">Algorithmic Mycelia</p>
            <figure class="card-image">
              <img src="context-review-4.jpeg" alt="Context Review 4.4" />
            </figure>
          </a>
        </section>
      </main>
    </div>
    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      const canvas = document.getElementById("hero-canvas");
      const scene = new THREE.Scene();

      const renderer = new THREE.WebGLRenderer({
        canvas,
        alpha: true,
        antialias: true
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
      camera.position.set(0, 0.15, 5.2);

      scene.add(new THREE.AmbientLight(0xffffff, 1.2));

      const dir1 = new THREE.DirectionalLight(0xffffff, 1.1);
      dir1.position.set(2.5, 3, 4);
      scene.add(dir1);

      const dir2 = new THREE.DirectionalLight(0xc8b6ff, 0.5);
      dir2.position.set(-2, 1, 3);
      scene.add(dir2);

      let mushroom = null;

      function resize() {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      resize();
      window.addEventListener("resize", resize);

      const loader = new GLTFLoader();
      loader.load("./mushroom-1.glb", (gltf) => {
        mushroom = gltf.scene;
        mushroom.position.set(0.35, -0.8, 0);
        mushroom.scale.setScalar(2.2);
        mushroom.rotation.x = 0.24;

        mushroom.traverse((child) => {
          if (child.isMesh && child.material) {
            child.material.transparent = true;
            child.material.opacity = 0.92;
          }
        });

        scene.add(mushroom);
      });

      function animate() {
        requestAnimationFrame(animate);

        if (mushroom) {
          mushroom.rotation.y += 0.006;
        }

        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
