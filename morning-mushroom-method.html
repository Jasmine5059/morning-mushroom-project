        0%, 100% { transform: translate(0, 0) rotate(-2deg); }
        25% { transform: translate(10vw, -6vh) rotate(3deg); }
        50% { transform: translate(4vw, 5vh) rotate(-2deg); }
        75% { transform: translate(14vw, 1vh) rotate(2deg); }
      }

        0%, 100% { transform: translate(0, 0) rotate(2deg); }
        25% { transform: translate(-11vw, -5vh) rotate(-3deg); }
        50% { transform: translate(-4vw, 6vh) rotate(2deg); }
        75% { transform: translate(-15vw, 1vh) rotate(-2deg); }
      }

        0%, 100% {
          transform: scale(1) rotate(0deg);
          border-radius: 47% 53% 46% 54% / 42% 47% 53% 58%;
        }
        50% {
          transform: scale(1.05) rotate(3deg);
          border-radius: 56% 44% 58% 42% / 50% 41% 59% 50%;
        }
      }

      @keyframes shimmer {
        0%, 100% { transform: translate(0, 0); opacity: 0.92; }
        50% { transform: translate(2px, -3px); opacity: 1; }
      }
