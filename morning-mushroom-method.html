      .bg-video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 1;
        background:

          linear-gradient(180deg, rgba(6, 12, 16, 0.26), rgba(6, 12, 16, 0.58));
      }

      .page {
        position: relative;
        z-index: 2;
        width: min(100vw - 40px, 1400px);
        margin: 0 auto;
        min-height: 100vh;
        padding: 18px 0 28px;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .header {
        display: flex;
        justify-content: flex-end;
        align-items: flex-start;
      }

      .nav a {
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
      }

      .nav a:hover,
      .nav a:focus-visible {
        border-color: rgba(255, 255, 255, 0.72);
      }

      .main {
        position: relative;
        overflow: hidden;
      }

      .title-wrap {
        position: absolute;
        top: 6.5vh;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        text-align: center;
        pointer-events: none;
      }

      .title {
        position: relative;
        font-family: "Orbitron", sans-serif;
        font-size: clamp(2.2rem, 4.6vw, 4.5rem);
        line-height: 0.96;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.96);
        text-shadow:
          0 0 18px rgba(180, 234, 255, 0.12),
          0 6px 22px rgba(0, 0, 0, 0.24);
        animation: titleFlicker 6s linear infinite;
      }

      .title::before,
      .title::after {
        content: attr(data-text);
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.22;
        mix-blend-mode: screen;
      }

      .title::before {
        color: rgba(120, 240, 255, 0.5);
        transform: translate(1px, 0);
        animation: glitchTitleA 2.4s steps(2) infinite;
      }

      .title::after {
        color: rgba(255, 120, 220, 0.34);
        transform: translate(-1px, 0);
        animation: glitchTitleB 3s steps(2) infinite;
      }

      .float-card {
        position: absolute;
        display: grid;
        justify-items: center;
        gap: 12px;
        width: 250px;
        will-change: transform;
      }

      .float-card.part-one {
        top: 30vh;
        left: 11vw;
        animation: driftOne 18s ease-in-out infinite;
      }

      .float-card.part-two {
        top: 49vh;
        right: 11vw;
        animation: driftTwo 20s ease-in-out infinite;
      }

      .part-label {
        font-family: "Orbitron", sans-serif;
        font-size: 0.95rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.28);
        animation: labelPulse 4.6s ease-in-out infinite;
      }

        height: 220px;
