<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4.2 On Becoming: The Morning Mushroom</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #050505;
        color: rgba(248, 245, 238, 0.95);
        font-family: "Cormorant Garamond", serif;
        overflow-x: hidden;
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><path fill='white' d='M16 6c5.2 0 9.3 3.1 10.4 8.1-3.1.8-6.8 1.2-10.4 1.2S8.7 14.9 5.6 14.1C6.7 9.1 10.8 6 16 6Zm-1.2 10.2h2.4v7.2c0 1.7-.7 2.6-1.2 2.6s-1.2-.9-1.2-2.6v-7.2Z'/></svg>")
            8 8,
          auto;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      p,
      h1,
      h2,
      blockquote {
        margin: 0;
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .bg-video-box {
        position: absolute;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      }

      .bg-video-box video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  background: #000;
  opacity: 0.9;
  filter: saturate(0.9) contrast(1.08) brightness(0.92);
}


      .bg-video-1 {
        top: 7vh;
        left: 3vw;
        width: min(42vw, 620px);
        height: min(46vh, 470px);
      }

      .bg-video-2 {
        top: 10vh;
        right: 3vw;
        width: min(40vw, 590px);
        height: min(38vh, 390px);
      }

      .bg-video-3 {
  bottom: 3vh;
  left: 9vw;
  width: min(42vw, 640px);
  height: min(42vh, 460px);
}

      .bg-video-3 video {
        object-fit: contain;
      }


      .bg-wash {
        position: fixed;
        inset: 0;
        z-index: 1;
        background:
          radial-gradient(circle at 18% 30%, rgba(96, 104, 126, 0.08), transparent 20%),
          radial-gradient(circle at 84% 22%, rgba(134, 110, 168, 0.07), transparent 22%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0.62));
      }

      .page {
        position: relative;
        z-index: 2;
        width: min(100vw - 40px, 1120px);
        margin: 0 auto;
        min-height: 100vh;
        padding: 18px 0 72px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
      }

      .kicker,
      .nav a {
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.82);
      }

      .nav {
        display: flex;
        gap: 16px;
      }

      .nav a {
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
      }

      .nav a:hover,
      .nav a:focus-visible {
        border-color: rgba(255, 255, 255, 0.52);
      }

      .main {
        position: relative;
        min-height: calc(100vh - 90px);
      }

      .title-block {
        position: absolute;
        right: 3vw;
        bottom: 4vh;
        z-index: 3;
        display: grid;
        gap: 4px;
        justify-items: end;
        text-align: right;
      }

      h1 {
  margin: 0;
}

.split-title {
  max-width: 16ch;
  display: grid;
  gap: 0.08em;
  text-align: right;
  line-height: 0.98;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.96);
}

.split-title span:first-child {
  font-size: clamp(1.8rem, 2.8vw, 2.6rem);
}

.split-title span:last-child {
  font-size: clamp(1.8rem, 2.8vw, 2.6rem);
}


.split-title span {
  display: block;
}


      h2 {
        width: min(100%, 52rem);
        margin: 8px auto 0;
        font-size: clamp(1.5rem, 2.6vw, 2.3rem);
        line-height: 1;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.94);
      }

      .text {
        display: grid;
        gap: 18px;
        justify-items: center;
      }

      .text p,
      .text blockquote {
        width: min(100%, 52rem);
        text-align: justify;
        text-align-last: left;
        font-size: 1.06rem;
        line-height: 1.9;
        color: rgba(245, 241, 233, 0.92);
      }

      .text blockquote {
        border-left: 1px solid rgba(255, 255, 255, 0.12);
        padding-left: 16px;
        font-style: italic;
      }

      .pull-quote {
        width: min(100%, 56rem);
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        gap: 0.22em 0.28em;
        justify-content: flex-start;
        line-height: 1.55;
        font-size: 1.02rem;
        font-style: italic;
      }

      .pull-quote .word {
        display: inline-block;
        animation: quotePull var(--dur, 5.6s) ease-in-out infinite;
        animation-delay: var(--delay, 0s);
      }

      .pull-quote .word:nth-child(4n + 1) { transform: translateY(-5px) scaleX(1.02); }
      .pull-quote .word:nth-child(4n + 2) { transform: translateY(2px) scaleX(0.98); }
      .pull-quote .word:nth-child(4n + 3) { transform: translateY(-2px) scaleX(1.03); }
      .pull-quote .word:nth-child(4n) { transform: translateY(4px) scaleX(0.97); }

      @keyframes quotePull {
        0% {
          transform: translateX(0) translateY(0) scaleX(1);
          letter-spacing: 0;
        }
        25% {
          transform: translateX(3px) translateY(-4px) scaleX(1.08);
          letter-spacing: 0.01em;
        }
        50% {
          transform: translateX(-2px) translateY(3px) scaleX(0.96);
          letter-spacing: -0.01em;
        }
        75% {
          transform: translateX(4px) translateY(-1px) scaleX(1.04);
          letter-spacing: 0.005em;
        }
        100% {
          transform: translateX(0) translateY(0) scaleX(1);
          letter-spacing: 0;
        }
      }

      @media (max-width: 980px) {
        .bg-video-1,
        .bg-video-2,
        .bg-video-3 {
          opacity: 0.55;
        }
      }

      @media (max-width: 800px) {
        .page {
          width: min(100vw - 24px, 1120px);
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .bg-video-1 {
  top: 9vh;
  left: 4vw;
  width: min(25vw, 660px);
  height: min(32vh, 580px);
}

.bg-video-2 {
  top: 16vh;
  right: 5vw;
  width: min(28vw, 710px);
  height: min(30vh, 580px);
}

.bg-video-3 {
  bottom: 8vh;
  left: 15vw;
  width: min(32vw, 760px);
  height: min(36vh, 640px);
}



        .title-block {
          right: 4vw;
          bottom: 5vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true">
      <div class="bg-video-box bg-video-1">
        <video autoplay muted loop playsinline>
          <source src="context-video-6.mov" type="video/mp4" />
        </video>
      </div>

      <div class="bg-video-box bg-video-2">
        <video autoplay muted loop playsinline>
          <source src="context-video-4.mov" type="video/mp4" />
        </video>
      </div>

      <div class="bg-video-box bg-video-3">
        <video autoplay muted loop playsinline>
          <source src="context-video-3.mov" type="video/mp4" />
        </video>
      </div>
    </div>

    <div class="bg-wash" aria-hidden="true"></div>

    <div class="page">
      <header class="header">
        <p class="kicker">Context Review / 4.2</p>
        <nav class="nav">
          <a href="context-review-mycology-anthropology.html">Next</a>
          <a href="index.html">Home</a>
        </nav>
      </header>

      <main class="main">
        <section class="title-block">
  <h1 class="split-title">
    <span>The Morning Mushroom</span>
    <span>and Rhizomatic Becoming</span>
  </h1>
</section>
      </main>
    </div>

    <script>
      function wrapWords(selector) {
        document.querySelectorAll(selector).forEach((node) => {
          const text = node.textContent.trim();
          const parts = text.split(/\s+/);
          node.innerHTML = parts
            .map((word, index) => {
              const delay = (index % 10) * 0.16;
              const dur = 4.8 + (index % 4) * 0.6;
              return `<span class="word" style="--delay:${delay}s;--dur:${dur}s">${word}</span>`;
            })
            .join(" ");
        });
      }

      wrapWords(".word-cloud");
    </script>
  </body>
</html>
