<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preface</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #ffffff;
        color: #13110d;
        font-family: "Cormorant Garamond", serif;
        overflow: hidden;
        cursor: auto;
      }

      a {
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      p,
      h1,
      figure {
        margin: 0;
      }

      .preface-page {
        position: relative;
        z-index: 1;
        width: min(100vw - 40px, 1380px);
        margin: 0 auto;
        min-height: 100vh;
        padding: 18px 0 24px;
        overflow: hidden;
      }

      .preface-header {
        position: relative;
        z-index: 12;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .preface-kicker,
      .preface-nav a {
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(19, 17, 13, 0.78);
      }

      .preface-nav {
        display: flex;
        gap: 16px;
      }

      .preface-nav a {
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
      }

      .preface-nav a:hover,
      .preface-nav a:focus-visible {
        border-color: rgba(19, 17, 13, 0.55);
      }

      .preface-stage {
        position: relative;
        min-height: calc(100vh - 60px);
      }

      .preface-title-wrap {
        position: absolute;
        top: 2vh;
        left: 0;
        right: 0;
        z-index: 2;
        pointer-events: none;
      }

      .preface-title {
        position: relative;
        font-size: clamp(12rem, 29vw, 28rem);
        line-height: 0.78;
        font-weight: 600;
        letter-spacing: -0.09em;
        color: #100f0c;
        user-select: none;
      }

      .preface-title span {
        position: relative;
        display: inline-block;
        opacity: 1;
        transform: none;
      }

      .preface-title span::after {
        content: none;
      }

      .preface-title::after {
        content: none;
      }

      .preface-cards {
        position: absolute;
        inset: 0;
        z-index: 8;
      }

      .preface-entry {
        position: absolute;
        display: grid;
        gap: 10px;
      }

      .preface-entry-label {
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(19, 17, 13, 0.82);
      }

      .preface-entry-card {
        overflow: hidden;
        box-shadow: 0 18px 42px rgba(44, 31, 9, 0.14);
        background: transparent;
      }

      .preface-entry-card img {
        display: block;
        width: 100%;
        height: auto;
        transform: scale(1.05);
        transform-origin: center center;
      }

      .preface-entry-1 {
        top: 30vh;
        left: 10vw;
        z-index: 6;
      }

      .preface-entry-2 {
        top: 22vh;
        left: 30vw;
        z-index: 8;
      }

      .preface-entry-3 {
        top: 32vh;
        left: 53vw;
        z-index: 7;
      }

      .preface-entry-1 .preface-entry-card {
        width: min(31vw, 430px);
        transform: rotate(-11deg);
      }

      .preface-entry-2 .preface-entry-card {
        width: min(28vw, 390px);
        transform: rotate(7deg);
      }

      .preface-entry-3 .preface-entry-card {
        width: min(31vw, 430px);
        transform: rotate(-6deg);
      }

      .preface-entry-1 .preface-entry-label {
        margin-left: 16px;
      }

      .preface-entry-2 .preface-entry-label {
        margin-left: 22px;
      }

      .preface-entry-3 .preface-entry-label {
        margin-left: 14px;
      }

      @media (max-width: 980px) {
        body {
          overflow-y: auto;
        }

        .preface-page {
          width: min(100vw - 24px, 1380px);
        }

        .preface-stage {
          min-height: auto;
          padding-bottom: 80px;
        }

        .preface-title-wrap,
        .preface-cards,
        .preface-footer-notes {
          position: static;
        }

        .preface-title-wrap {
          margin-top: 24px;
        }

        .preface-cards {
          display: grid;
          grid-template-columns: 1fr;
          gap: 18px;
          margin-top: 24px;
        }

        .preface-entry {
          position: static;
        }

        .preface-entry-1 .preface-entry-card,
        .preface-entry-2 .preface-entry-card,
        .preface-entry-3 .preface-entry-card {
          width: min(70vw, 420px);
          transform: none;
        }

      }
    </style>
  </head>
  <body>
    <div class="preface-page">
      <header class="preface-header">
        <p class="preface-kicker">Chapter 3</p>
        <nav class="preface-nav" aria-label="页面导航">
          <a href="index.html">Home</a>
        </nav>
      </header>

      <main class="preface-stage">
        <section class="preface-title-wrap" aria-hidden="true">
          <h1 class="preface-title">
            <span data-letter="p">p</span><span data-letter="r">r</span><span data-letter="e">e</span><span data-letter="f">f</span><span data-letter="a">a</span><span data-letter="c">c</span><span data-letter="e">e</span>
          </h1>
        </section>

        <section class="preface-cards" aria-label="Preface entry pages">
          <a class="preface-entry preface-entry-1" href="preface-introduction.html">
            <p class="preface-entry-label">Introduction</p>
            <figure class="preface-entry-card">
              <img src="preface-image-1.jpg" alt="Introduction preview" />
            </figure>
          </a>

          <a class="preface-entry preface-entry-2" href="preface-positioning-practice.html">
            <p class="preface-entry-label">Positioning Practice</p>
            <figure class="preface-entry-card">
              <img src="preface-image-2.jpg" alt="Positioning Practice preview" />
            </figure>
          </a>

          <a class="preface-entry preface-entry-3" href="preface-encountering-morning-mushroom.html">
            <p class="preface-entry-label">Encountering Morning Mushroom</p>
            <figure class="preface-entry-card">
              <img src="preface-image-3.jpg" alt="Encountering Morning Mushroom preview" />
            </figure>
          </a>
        </section>
      </main>
    </div>
  </body>
</html>
